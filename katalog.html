<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog | Niskala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #4a3f35; transition: opacity 0.4s ease, transform 0.4s ease; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(250, 248, 245, 0.8); backdrop-filter: blur(16px); border-bottom: 1px solid #eeeae5; }
        
        /* Animasi masuk saat halaman dimuat */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        
        /* Efek klik pada kartu */
        .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
        .card-hover:active { transform: scale(0.96); }
    </style>
</head>
<body id="page-body">
    <nav class="fixed top-0 w-full z-50 glass-nav">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-widest uppercase nav-link">Niskala</a>
            <div class="flex space-x-6 text-[10px] font-bold uppercase tracking-[0.2em]">
                <a href="index.html" class="hover:text-rose-400 transition nav-link">Beranda</a>
                <a href="katalog.html" class="text-rose-800 nav-link">Katalog</a>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-12 text-center px-6 animate-fade">
        <span class="text-xs uppercase tracking-[0.3em] text-rose-800/60 mb-4 block">Koleksi Kami</span>
        <h1 class="text-4xl md:text-5xl text-[#4a3f35] mb-4">Pilihan Estetika</h1>
        <p class="text-gray-500 font-light max-w-lg mx-auto">Temukan desain yang paling resonan dengan cerita dan kepribadian Anda.</p>
    </header>

    <section class="pb-24 px-6 max-w-6xl mx-auto">
        <div class="grid md:grid-cols-3 gap-8">
            <a href="rose-pastel.html" class="package-link block bg-white p-5 shadow-sm border border-[#eeeae5] card-hover animate-fade delay-100 group">
                <div class="overflow-hidden mb-5">
                    <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=600&auto=format&fit=crop" alt="Rose Pastel" class="w-full h-72 object-cover transform group-hover:scale-105 transition-transform duration-700">
                </div>
                <h3 class="text-2xl mb-1 text-[#4a3f35]">Rose Pastel</h3>
                <p class="text-sm font-light text-gray-500 mb-4">Rp 150.000</p>
                <div class="h-[1px] w-0 bg-rose-800 group-hover:w-full transition-all duration-500"></div>
            </a>

            <a href="classic-ivory.html" class="package-link block bg-white p-5 shadow-sm border border-[#eeeae5] card-hover animate-fade delay-200 group">
                <div class="overflow-hidden mb-5 relative">
                    <div class="absolute top-3 right-3 bg-[#4a3f35] text-white text-[9px] uppercase tracking-widest px-3 py-1 z-10">Best Seller</div>
                    <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=600&auto=format&fit=crop" alt="Classic Ivory" class="w-full h-72 object-cover transform group-hover:scale-105 transition-transform duration-700">
                </div>
                <h3 class="text-2xl mb-1 text-[#4a3f35]">Classic Ivory</h3>
                <p class="text-sm font-light text-gray-500 mb-4">Rp 200.000</p>
                <div class="h-[1px] w-0 bg-[#8b7e6a] group-hover:w-full transition-all duration-500"></div>
            </a>

            <a href="monochrome.html" class="package-link block bg-white p-5 shadow-sm border border-[#eeeae5] card-hover animate-fade delay-300 group">
                <div class="overflow-hidden mb-5">
                    <img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?q=80&w=600&auto=format&fit=crop" alt="Monochrome" class="w-full h-72 object-cover filter grayscale transform group-hover:scale-105 transition-transform duration-700">
                </div>
                <h3 class="text-2xl mb-1 text-[#111111]">Monochrome</h3>
                <p class="text-sm font-light text-gray-500 mb-4">Rp 150.000</p>
                <div class="h-[1px] w-0 bg-[#111111] group-hover:w-full transition-all duration-500"></div>
            </a>
        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const body = document.getElementById("page-body");
            const links = document.querySelectorAll(".nav-link, .package-link");
            links.forEach(link => {
                link.addEventListener("click", function(e) {
                    e.preventDefault(); 
                    const targetUrl = this.getAttribute("href");
                    body.style.opacity = "0"; 
                    body.style.transform = "scale(0.98)";
                    setTimeout(() => { window.location.href = targetUrl; }, 400);
                });
            });
        });
        window.addEventListener('pageshow', (event) => {
            const body = document.getElementById("page-body");
            if (body) { body.style.opacity = "1"; body.style.transform = "scale(1)"; }
        });
    </script>
</body>
</html>
